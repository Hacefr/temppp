<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom FNF Mod Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Main Game Screen Canvas -->
        <canvas id="gameCanvas" width="1280" height="720"></canvas>

        <!-- HTML Chart Editor Interface Overlaid inside the container -->
        <div id="editorUI" style="display: none;">
            <div class="editor-sidebar">
                <h3>Song Config</h3>
                <label>BPM: 
                    <input type="number" id="song-bpm" value="100">
                </label>
                
                <hr>
                <h3>Audio Track</h3>
                <input type="file" id="audio-uploader" accept="audio/*">
                
                <div class="audio-controls">
                    <button id="btn-audio-play">Play Music</button>
                </div>
                <div id="audio-time-display">Time: 0.00s</div>

                <button id="btn-export" onclick="exportChartJSON()">
                    Export JSON
                </button>
            </div>
            
            <div class="editor-grid-container">
                <div class="grid-headers">
                    <span>L</span><span>D</span><span>U</span><span>R</span>
                    <span>L</span><span>D</span><span>U</span><span>R</span>
                    <div class="header-actions">
                        <button onclick="exportChartJSON()">Export Chart</button>
                        <!-- Back button to return to our new main menu state -->
                        <button onclick="returnToMenuFromEditor()" style="background:#ff3344; color:#fff; margin-left:10px;">Exit Editor</button>
                    </div>
                </div>
                <div id="chart-grid" class="chart-grid"></div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
    <script src="game2.js"></script>
    <script src="editor.js"></script>
</body>
</html>
